<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Renderizado Espacial Basado en Datos (V4)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            flex: 1;
            height: 100%;
            perspective: 1000px;
            transform-style: preserve-3d;
            position: relative;
        }

        /* Asegurar que los nodos tengan comportamiento transformable por defecto */
        .node {
            position: absolute;
            transform-style: preserve-3d;
            transform-origin: center center;
        }

        #sidebar {
            width: 250px;
            height: 100%;
            background: #222;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 9999;
            color: #fff;
            font-family: sans-serif;
        }

        #sidebar h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-template {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-template:hover {
            background: #444;
        }

        .btn-template:active {
            transform: scale(0.98);
        }

        .btn-template.active {
            background: #4facfe;
            border-color: #00f2fe;
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Plantillas 3D</h2>
        <button class="btn-template active" data-url="./data.json">Demo Original</button>
        <button class="btn-template" data-url="./template_gallery.json">Galería 3D</button>
        <button class="btn-template" data-url="./template_solar.json">Sistema Solar</button>
        <button class="btn-template" data-url="./template_city.json">Ciudad Abstracta</button>
        <button class="btn-template" data-url="./template_carousel.json">Carrusel Circular</button>
        <button class="btn-template" data-url="./template_tunnel.json">Túnel Espacial</button>
        <button class="btn-template" data-url="./template_phone.json">Teléfono Inteligente</button>
    </div>
    <div id="app"></div>

    <script type="module">
        import { initEngine } from './engine.js';

        const buttons = document.querySelectorAll('.btn-template');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Actualizar estilo activo
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Cargar nueva plantilla
                const url = btn.getAttribute('data-url');
                initEngine(url);
            });
        });
    </script>
</body>
</html>
