<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor V4 Test</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; color: white; font-family: sans-serif; height: 100vh; perspective: 1000px; }
        #app { width: 100vw; height: 100vh; position: relative; transform-style: preserve-3d; }
        /* Just some basic reset since everything else is inline CSS via JS */
        div { position: absolute; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import { engine } from './src/core/Engine.js';
        import { renderer } from './src/render/Renderer.js';

        // Fake DataLoader for test
        const testData = {
            id: "scene",
            props: {
                width: "100%", height: "100%",
                display: "flex", justifyContent: "center", alignItems: "center"
            },
            logic: {
                lookAtMouse: { maxRotationX: 45, maxRotationY: 45, inertia: 0.95 }
            },
            children: [
                {
                    id: "cube",
                    props: {
                        width: "200px", height: "200px", backgroundColor: "rgba(0, 150, 255, 0.5)",
                        border: "2px solid #0096ff", borderRadius: "20px",
                        display: "flex", justifyContent: "center", alignItems: "center", fontSize: "24px",
                        transform: { translateZ: 100 } // Z-offset so it rotates visually around center
                    },
                    logic: {
                        mouseFollow: { multiplierX: 50, multiplierY: 50, inertia: 0.9 }
                    },
                    children: [
                        {
                            id: "text",
                            props: {
                                color: "white", innerHTML: "V4 Engine"
                            }
                        }
                    ]
                },
                {
                    id: "grid",
                    logic: {
                        instancias: 5
                    },
                    props: {
                        width: "50px", height: "50px", backgroundColor: "rgba(255, 0, 150, 0.3)",
                        border: "1px solid #ff0096",
                        transform: { translateZ: -50 }
                    }
                }
            ]
        };

        // Engine init
        document.addEventListener('DOMContentLoaded', () => {
            engine.init('app');
            renderer.mount(testData);

            // Post-mount tweak for innerHTML (since we didn't build a full prop parser yet)
            const textEl = document.getElementById('scene.cube.text');
            if(textEl) textEl.innerHTML = "V4 Engine";

            // Distribute grid instances
            for(let i=0; i<5; i++) {
                const id = `scene.grid:ins[${i}]`;
                const el = document.getElementById(id);
                if (el) {
                    el.style.left = `${(i * 60) + 10}px`;
                    el.style.top = `10px`;
                }
            }
        });
    </script>
</body>
</html>
