<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Renderizado Espacial Basado en Datos (V4)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100%;
            perspective: 1000px;
            transform-style: preserve-3d;
            position: relative;
        }

        /* Asegurar que los nodos tengan comportamiento transformable por defecto */
        .node {
            position: absolute;
            transform-style: preserve-3d;
            transform-origin: center center;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./engine.js"></script>
</body>
</html>
