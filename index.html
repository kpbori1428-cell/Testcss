<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor V4 - Spatial Engine</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; perspective: 1000px; }
        #app { width: 100vw; height: 100vh; position: relative; transform-style: preserve-3d; }
        div { position: absolute; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import { engine } from './src/core/Engine.js';

        document.addEventListener('DOMContentLoaded', async () => {
            await engine.init('app');
            await engine.loadTemplates('templates.json');

            // Load Volumetric Demo by default
            await engine.loadAndMount('volumetric_demo.json');
            engine.applyTheme('solar');

            // Switch after 8s for variety
            setTimeout(() => engine.transitionTo('data.json'), 8000);
        });
    </script>
</body>
</html>
